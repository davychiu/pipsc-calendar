name: Sync and deploy

on:
  schedule:
    - cron: '17 5,17 * * *'   # incremental, twice daily
    - cron: '43 9 1 * *'      # monthly full sweep (prunes deleted events)
  workflow_dispatch:
    inputs:
      full:
        description: 'Full sweep (re-check every event in the index)'
        type: boolean
        default: false
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Sync events
        run: |
          if [ "${{ github.event.schedule }}" = "43 9 1 * *" ] || [ "${{ inputs.full }}" = "true" ]; then
            node src/sync.mjs --full
          else
            node src/sync.mjs
          fi
      - name: Commit data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: sync event data"
          git push
      - name: Build site
        run: node src/build.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
